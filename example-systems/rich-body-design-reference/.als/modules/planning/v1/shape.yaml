dependencies:
  - module: people
  - module: evals

entities:
  dossier:
    path: dossiers/{id}.md

    identity:
      id_field: id

    fields:
      id:
        type: id
        allow_null: false

      title:
        type: string
        allow_null: false

      status:
        type: enum
        allow_null: false
        allowed_values: [draft, active, blocked, completed]

      owner_ref:
        type: ref
        allow_null: false
        target:
          module: people
          entity: person

      target_date:
        type: date
        allow_null: false

      related_eval_ref:
        type: ref
        allow_null: false
        target:
          module: evals
          entity: eval-spec

    body:
      title:
        source:
          kind: field
          field: title

      preamble:
        allow_null: false
        content:
          mode: freeform
          blocks:
            paragraph: {}
            bullet_list: {}
          guidance:
            include: why the dossier exists now and the decision horizon it serves
            exclude: detailed option analysis that belongs in later sections

      sections:
        - name: GOAL
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              heading:
                min_depth: 3
                max_depth: 4
          guidance:
            include: success statement, target state, and hard boundaries
            exclude: execution transcript detail

        - name: ASSUMPTIONS
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              ordered_list: {}
              heading:
                min_depth: 3
                max_depth: 4
              blockquote: {}
          guidance:
            include: explicit assumptions, confidence notes, and fragile dependencies
            exclude: chosen-plan narration

        - name: OPTIONS
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              ordered_list: {}
              table:
                syntax: gfm
              heading:
                min_depth: 3
                max_depth: 4
              blockquote: {}
              code: {}
          guidance:
            include: alternatives, tradeoffs, and comparison criteria
            exclude: post-decision execution logs

        - name: EXECUTION_TRANSCRIPT
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              ordered_list: {}
              heading:
                min_depth: 3
                max_depth: 4
              blockquote: {}
              code: {}
          guidance:
            include: important planning turns, command snippets, and pivotal observations
            exclude: exhaustive raw chat history

        - name: NEXT_ACTIONS
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              ordered_list: {}
              heading:
                min_depth: 3
                max_depth: 4
          guidance:
            include: owned follow-up actions, sequencing, and handoff notes
            exclude: duplicate rationale already captured in GOAL or OPTIONS
