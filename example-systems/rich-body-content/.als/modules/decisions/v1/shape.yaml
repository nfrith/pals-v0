dependencies: []

entities:
  brief:
    path: "{id}.md"

    identity:
      id_field: id

    fields:
      id:
        type: id
        allow_null: false

      title:
        type: string
        allow_null: false

      status:
        type: enum
        allow_null: false
        allowed_values: [proposed, under-review, decided, superseded]

      meeting_date:
        type: date
        allow_null: true

    body:
      title:
        source:
          kind: field
          field: id

      sections:
        - name: CONTEXT
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
          guidance:
            include: background, constraints, and what prompted this decision
            exclude: options analysis or final decision

        - name: OPTIONS
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              table:
                syntax: gfm
              heading:
                min_depth: 3
                max_depth: 4
              blockquote: {}
          guidance:
            include: each option as a subheading with description, pros, cons, and relevant quotes or references
            exclude: the final decision or action items

        - name: DECISION
          allow_null: true
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
          guidance:
            include: what was decided, the primary reasoning, and any conditions
            exclude: rehashing the options already covered above

        - name: ACTION_ITEMS
          allow_null: true
          content:
            mode: freeform
            blocks:
              ordered_list: {}
              bullet_list: {}
          guidance:
            include: concrete next steps with owners and dates where known
            exclude: background context or decision rationale

        - name: NOTES
          allow_null: true
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              blockquote: {}
          guidance:
            include: dissenting opinions, caveats, or follow-up triggers
            exclude: action items or options already documented above
