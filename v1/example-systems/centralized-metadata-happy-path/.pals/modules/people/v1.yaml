schema: pals-module@1

dependencies: []

entities:
  person:
    path: persons/{id}.md

    identity:
      id_field: id

    fields:
      id:
        type: id
        required: true
        allow_null: false

      display_name:
        type: string
        required: true
        allow_null: false

      status:
        type: enum
        required: true
        allow_null: false
        allowed_values: [active, inactive]

      tags:
        type: list
        required: true
        allow_null: true
        items:
          type: string

    sections:
      - name: PROFILE
        required: true
        allow_null: false
        content:
          allowed_blocks: [paragraph]
          allow_subheadings: false
          allow_blockquotes: false
          allow_code_blocks: false
        guidance:
          include: who this person is and the role they play in this workspace
          exclude: transient task updates

      - name: CONTACT
        required: true
        allow_null: true
        content:
          allowed_blocks: [paragraph, bullet_list, ordered_list]
          allow_subheadings: false
          allow_blockquotes: false
          allow_code_blocks: false
        guidance:
          include: stable contact channels or handles
          exclude: private credentials or secrets

      - name: NOTES
        required: true
        allow_null: true
        content:
          allowed_blocks: [paragraph]
          allow_subheadings: false
          allow_blockquotes: false
          allow_code_blocks: false
        guidance:
          include: optional context and collaboration notes
          exclude: authoritative policy statements
