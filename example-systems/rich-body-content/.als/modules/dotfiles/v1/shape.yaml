dependencies: []

entities:
  config:
    source_format: markdown
    path: configs/{id}.md

    identity:
      id_field: id

    fields:
      id:
        type: id
        allow_null: false

      name:
        type: string
        allow_null: false

      tool:
        type: string
        allow_null: false

      status:
        type: enum
        allow_null: false
        allowed_values: [active, deprecated, draft]

    body:
      title:
        source:
          kind: field
          field: name

      sections:
        - name: PURPOSE
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
          guidance:
            include: what this config does and why it exists
            exclude: setup instructions or install steps

        - name: NOTES
          allow_null: true
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
          guidance:
            include: quirks, gotchas, or context for future edits
            exclude: full change history

  profile:
    source_format: markdown
    path: profiles/{id}.md

    identity:
      id_field: id

    fields:
      id:
        type: id
        allow_null: false

      name:
        type: string
        allow_null: false

      machine:
        type: string
        allow_null: false

      status:
        type: enum
        allow_null: false
        allowed_values: [active, archived]

    body:
      title:
        source:
          kind: field
          field: name

      sections:
        - name: SETUP
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              ordered_list: {}
          guidance:
            include: what this profile provisions and the order of operations
            exclude: individual config file details tracked in config entities

        - name: NOTES
          allow_null: true
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
          guidance:
            include: machine-specific quirks or environment constraints
            exclude: general tool documentation
