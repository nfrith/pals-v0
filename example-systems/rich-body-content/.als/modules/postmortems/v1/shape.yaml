dependencies: []

entities:
  incident:
    path: "{id}.md"

    identity:
      id_field: id

    fields:
      id:
        type: id
        allow_null: false

      title:
        type: string
        allow_null: false

      severity:
        type: enum
        allow_null: false
        allowed_values: [sev1, sev2, sev3]

      status:
        type: enum
        allow_null: false
        allowed_values: [investigating, mitigated, resolved, closed]

      incident_date:
        type: date
        allow_null: false

      resolved_date:
        type: date
        allow_null: true

    body:
      title:
        source:
          kind: field
          field: id

      sections:
        - name: SUMMARY
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
          guidance:
            include: one-paragraph executive summary of what happened and what was affected
            exclude: detailed timeline or root cause analysis

        - name: TIMELINE
          allow_null: false
          content:
            mode: freeform
            blocks:
              bullet_list: {}
              ordered_list: {}
              heading:
                min_depth: 3
                max_depth: 4
              blockquote: {}
          guidance:
            include: chronological events grouped by phase, with quoted log excerpts or alerts where relevant
            exclude: root cause speculation or remediation steps

        - name: ROOT_CAUSE
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              code: {}
          guidance:
            include: causal chain from trigger to impact, with supporting code or config evidence
            exclude: timeline details or remediation steps

        - name: IMPACT
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              table:
                syntax: gfm
          guidance:
            include: what was affected, duration, user-facing consequences, and metrics
            exclude: root cause or remediation details

        - name: REMEDIATION
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              ordered_list: {}
              heading:
                min_depth: 3
                max_depth: 4
              code: {}
          guidance:
            include: immediate fixes taken and planned follow-up actions with owners
            exclude: timeline replay or impact assessment

        - name: LESSONS
          allow_null: true
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
          guidance:
            include: what we learned, what we would do differently, and systemic patterns
            exclude: action items already captured in remediation
