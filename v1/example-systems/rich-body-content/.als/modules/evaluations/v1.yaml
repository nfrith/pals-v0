schema: als-module@1

dependencies: []

entities:
  evaluation:
    path: reviews/{id}.md

    identity:
      id_field: id

    fields:
      id:
        type: id
        allow_null: false

      title:
        type: string
        allow_null: false

      category:
        type: enum
        allow_null: false
        allowed_values: [infrastructure, tooling, vendor, library]

      decision:
        type: enum
        allow_null: true
        allowed_values: [pending, approved, rejected, deferred]

      decided_on:
        type: date
        allow_null: true

    sections:
      - name: CONTEXT
        allow_null: false
        content:
          allowed_blocks: [paragraph, bullet_list]
          allow_subheadings: false
          allow_blockquotes: false
          allow_code_blocks: false
        guidance:
          include: why this evaluation is happening, what problem it solves, and current state
          exclude: candidate-specific details or comparison analysis

      - name: CANDIDATES
        allow_null: false
        content:
          allowed_blocks: [paragraph, bullet_list]
          allow_subheadings: true
          allow_blockquotes: true
          allow_code_blocks: true
        guidance:
          include: each candidate as a subheading with description, quoted terms or pricing, and code samples where relevant
          exclude: comparative analysis or final recommendation

      - name: CRITERIA
        allow_null: false
        content:
          allowed_blocks: [bullet_list, ordered_list]
          allow_subheadings: false
          allow_blockquotes: false
          allow_code_blocks: false
        guidance:
          include: evaluation criteria ranked by importance with weighting rationale
          exclude: candidate-specific scores or opinions

      - name: ANALYSIS
        allow_null: false
        content:
          allowed_blocks: [paragraph, bullet_list]
          allow_subheadings: true
          allow_blockquotes: false
          allow_code_blocks: true
        guidance:
          include: per-candidate analysis against criteria, with code benchmarks or config examples where applicable
          exclude: final recommendation or decision

      - name: DECISION
        allow_null: true
        content:
          allowed_blocks: [paragraph, bullet_list]
          allow_subheadings: false
          allow_blockquotes: false
          allow_code_blocks: false
        guidance:
          include: what was chosen, why, and any conditions or constraints on the decision
          exclude: detailed per-candidate analysis
