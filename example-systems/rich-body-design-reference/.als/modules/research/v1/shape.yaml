dependencies:
  - module: people

entities:
  synthesis:
    path: syntheses/{id}.md

    identity:
      id_field: id

    fields:
      id:
        type: id
        allow_null: false

      title:
        type: string
        allow_null: false

      status:
        type: enum
        allow_null: false
        allowed_values: [draft, reviewed, adopted]

      reviewed_on:
        type: date
        allow_null: false

      author_refs:
        type: list
        allow_null: false
        items:
          type: ref
          target:
            module: people
            entity: person

    body:
      title:
        source:
          kind: field
          field: title

      preamble:
        allow_null: false
        content:
          mode: freeform
          blocks:
            paragraph: {}
            bullet_list: {}
          guidance:
            include: why the synthesis was commissioned and the decision surface it should inform
            exclude: source-by-source evidence detail

      sections:
        - name: QUESTION
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              heading:
                min_depth: 3
                max_depth: 4
          guidance:
            include: the exact question or decision pressure driving the synthesis
            exclude: evidence excerpts

        - name: EVIDENCE
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              ordered_list: {}
              heading:
                min_depth: 3
                max_depth: 4
              blockquote: {}
              code: {}
          guidance:
            include: source summaries, quoted evidence, and contradictory findings
            exclude: the final recommendation phrased as settled policy

        - name: SYNTHESIS
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              ordered_list: {}
              table:
                syntax: gfm
              heading:
                min_depth: 3
                max_depth: 4
              blockquote: {}
          guidance:
            include: cross-source interpretation, patterns, and confidence calls
            exclude: raw excerpt dumps without analysis

        - name: DECISION
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              heading:
                min_depth: 3
                max_depth: 4
          guidance:
            include: the current recommendation, constraints, and adoption boundary
            exclude: unrelated operational TODOs

        - name: OPEN_QUESTIONS
          allow_null: true
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              heading:
                min_depth: 3
                max_depth: 4
          guidance:
            include: unresolved unknowns and evidence gaps
            exclude: already-decided policy
