dependencies: []

entities:
  person:
    path: persons/{id}.md

    identity:
      id_field: id

    fields:
      id:
        type: id
        allow_null: false

      title:
        type: string
        allow_null: false

      role:
        type: enum
        allow_null: false
        allowed_values: [incident-commander, operations-scribe]

      timezone:
        type: string
        allow_null: false

      specialty:
        type: string
        allow_null: false

    body:
      title:
        source:
          kind: field
          field: title

      sections:
        - name: BIO
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              heading:
                min_depth: 3
                max_depth: 4
          guidance:
            include: durable background, scope of expertise, and operating focus
            exclude: per-incident updates and short-lived coordination notes

        - name: WORKSTYLE
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
              ordered_list: {}
              heading:
                min_depth: 3
                max_depth: 4
          guidance:
            include: communication preferences, decision cadence, and collaboration habits
            exclude: private administrative detail

        - name: ESCALATION_PREFERENCES
          allow_null: false
          content:
            mode: freeform
            blocks:
              paragraph: {}
              bullet_list: {}
          guidance:
            include: how to page, what context to gather first, and when to interrupt
            exclude: broad biographical detail already covered elsewhere
