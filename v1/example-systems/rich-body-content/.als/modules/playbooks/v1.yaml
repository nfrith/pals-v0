schema: als-module@1

dependencies: []

entities:
  playbook:
    path: guides/{id}.md

    identity:
      id_field: id

    fields:
      id:
        type: id
        allow_null: false

      title:
        type: string
        allow_null: false

      service:
        type: string
        allow_null: false

      auth_method:
        type: enum
        allow_null: false
        allowed_values: [api-key, oauth2, hmac, mtls]

      status:
        type: enum
        allow_null: false
        allowed_values: [draft, current, deprecated]

    sections:
      - name: OVERVIEW
        allow_null: false
        content:
          allowed_blocks: [paragraph]
          allow_subheadings: false
          allow_blockquotes: false
          allow_code_blocks: false
        guidance:
          include: what this integration does, why we use it, and what it replaces if anything
          exclude: setup instructions or endpoint specifics

      - name: AUTHENTICATION
        allow_null: false
        content:
          allowed_blocks: [paragraph, bullet_list, ordered_list]
          allow_subheadings: false
          allow_blockquotes: true
          allow_code_blocks: true
        guidance:
          include: how to authenticate, key management, env var names, and example config
          exclude: endpoint-specific request details

      - name: ENDPOINTS
        allow_null: false
        content:
          allowed_blocks: [paragraph, bullet_list]
          allow_subheadings: true
          allow_blockquotes: false
          allow_code_blocks: true
        guidance:
          include: each endpoint as a subheading with method, path, request/response examples
          exclude: auth setup details covered in the previous section

      - name: ERROR_HANDLING
        allow_null: false
        content:
          allowed_blocks: [paragraph, bullet_list]
          allow_subheadings: false
          allow_blockquotes: true
          allow_code_blocks: true
        guidance:
          include: common error codes, retry policy, and failure modes with example responses
          exclude: happy-path request/response flows

      - name: CHANGELOG
        allow_null: false
        content:
          allowed_blocks: [bullet_list]
          allow_subheadings: false
          allow_blockquotes: false
          allow_code_blocks: false
        guidance:
          include: dated entries for integration changes, version bumps, and breaking changes
          exclude: general service news unrelated to our integration
