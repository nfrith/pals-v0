schema: pals-system@1
system_id: centralized-happy-path

roots:
  workspace:
    path: workspace
  clients:
    path: clients
  content:
    path: content
  repos:
    path: repos
  dotfiles:
    path: dotfiles

modules:
  people:
    mount: workspace
    path: people
    deployed_version: 1
    shape: .pals/modules/people/v1.yaml
    skill: .claude/skills/people-module/SKILL.md

  backlog:
    mount: workspace
    path: backlog
    deployed_version: 1
    shape: .pals/modules/backlog/v1.yaml
    skill: .claude/skills/backlog-module/SKILL.md

  experiments:
    mount: workspace
    path: experiments
    deployed_version: 2
    shape: .pals/modules/experiments/v2.yaml
    skill: .claude/skills/experiments-module/SKILL.md

  client-registry:
    mount: clients
    path: registry
    deployed_version: 1
    shape: .pals/modules/client-registry/v1.yaml
    skill: .claude/skills/client-registry-module/SKILL.md
